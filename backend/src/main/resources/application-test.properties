# Configuração para o banner de inicialização (opcional, mas útil para identificação rápida do ambiente)
spring.application.name=DSCatalog

# Porta padrão para testes (pode ser alterada se necessário)
server.port=8080

# ================================
# DATASOURCE (H2 - EM MEMÓRIA)
# ================================
# Banco em memória para testes rápidos
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.username=sa
spring.datasource.password=

# ================================
# H2 CONSOLE (INTERFACE WEB)
# ================================
# Habilita acesso ao console do banco
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ================================
# JPA / HIBERNATE
# ================================
# Permite carregar dados após criação do schema
spring.jpa.defer-datasource-initialization=true

# Exibe SQL no console
spring.jpa.show-sql=true

# Formata SQL para melhor leitura
spring.jpa.properties.hibernate.format_sql=true

# ================================
# LOGGING - VISÃO GERAL (TEST)
# ================================
# Foco em debug e rastreabilidade completa

# Nível global (reduz ruído externo)
logging.level.root=WARN

# Logs da aplicação
logging.level.com.albertsilva.dev.dscatalog=DEBUG

# Requisições HTTP (Spring MVC)
logging.level.org.springframework.web=DEBUG

# Detalhes completos do ciclo HTTP (usar apenas em teste)
logging.level.org.springframework.web.servlet.mvc.method.annotation=TRACE

# SQL gerado pelo Hibernate
logging.level.org.hibernate.SQL=DEBUG

# Parâmetros das queries (Hibernate 6+)
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# Configuração de indentação para JSON (opcional, mas útil para leitura de logs)
spring.jackson.serialization.indent_output=true

# ================================
# LOG EM ARQUIVO
# ================================
# Arquivo separado por ambiente (test)
logging.file.name=logs/test/dscatalog-test.log

# Controle de tamanho e histórico
logging.logback.rollingpolicy.max-file-size=5MB
logging.logback.rollingpolicy.max-history=5

# ================================
# DOCUMENTAÇÃO API (SPRINGDOC)
# ================================
# Swagger UI
springdoc.swagger-ui.path=/docs-vendas.html

# Endpoint OpenAPI
springdoc.api-docs.path=/docs-vendas

# Pacotes escaneados
springdoc.packagesToScan=com.albertsilva.dev.dscatalog.web.controllers

