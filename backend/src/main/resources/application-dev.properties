# LOCALE
spring.web.locale-resolver=fixed
spring.web.locale=pt_BR
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true

#POSTGRESQL
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/dscatalog?createDatabaseIfNotExist=true
spring.datasource.username=${POSTGRES_DATASOURCE_USER}
spring.datasource.password=${POSTGRES_DATASOURCE_PASSWORD}

#JPA 
spring.jpa.show-sql= true
spring.jpa.hibernate.ddl-auto=update
# spring.jpa.properties.hibernate.format_sql=true

## Hibernate Properties
# The SQL dialect makes Hibernate generate better SQL for the chosen database
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
# spring.jpa.hibernate.naming.physical-strategy=org.springframework.boot.orm.jpa.hibernate.SpringPhysicalNamingStrategy

#FLYWAY
spring.flyway.baseline-on-migrate=true 
# spring.flyway.baseline-version=1.0

# Nível de Log para Desenvolvimento (ajustado para DEBUG para obter mais detalhes durante o desenvolvimento)
logging.level.root=WARN
logging.level.com.albertsilva.dev.dscatalog=DEBUG
logging.level.org.springframework.web=INFO

# SQL (opcional)
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Arquivo
logging.file.name=logs/dev/dscatalog-dev.log

# Rolling
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=10